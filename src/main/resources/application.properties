# application.properties 파일은 항상 resource폴더 바로 아래 만든다.
# 목적 : 스프링 서버가 실행될 때 설정을 로딩하는 파일
# 주석할 때는 '#' 사용한다
# 참고 : IntelliJ IDEA -> 설정 -> 에디터 -> 파일 인코딩 -> 프로퍼티 파일에 대한 디폴트 인코딩 : UTF-8 변

# 1. 내장 AWS PORT(프로그램식변번호) 번호 변경 , 기본값은 8080 이며 수정 가눙
server.port=8081

# 2. DAO 가 아닌 프로퍼티 파일에서 DB 연동 가능하다. JDBC
# 2-1 연동할 DB 서버의 주소
# spring.datasource.url=jdbc:mysql://localhost:3306/mydb0305
# spring.datasource.url=jdbc:mysql://localhost:3306/boardservice10
spring.datasource.url=jdbc:mysql://localhost:3306/mydb0309

# 2-2 연동할 DB 서버의 계정/비밀번호
spring.datasource.username=root
spring.datasource.password=1234

# 2-3 Entity 테이블 생성
# create : 서버실행할때마다 삭제후 생성
# update : 서버실행할때마다 존재하면 수정 존재하지 않으면 생성
# none : 사용안함
spring.jpa.hibernate.ddl-auto=create

# 2-4
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true